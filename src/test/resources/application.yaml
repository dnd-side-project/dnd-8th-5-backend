spring:
  jpa:
    # 로컬에서 SQL 보고 싶으면 환경변수로 켠다 (Gradle -D는 test worker로 전파되지 않음):
    #   SPRING_JPA_SHOW_SQL=true \
    #   SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL=true \
    #   LOGGING_LEVEL_ORG_HIBERNATE_TYPE_DESCRIPTOR_SQL_BASICBINDER=TRACE \
    #   ./gradlew test
    show-sql: false
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: false
    generate-ddl: true
  datasource:
    url:
    username: sa
  h2:
    console:
      enabled:
        true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: test
            client-secret: test
            redirect-uri: "{baseUrl}/oauth2/kakao/callback"
            authorization-grant-type: authorization_code
            client-authentication-method: POST
            client-name: Kakao
            scope:
              - profile_nickname
              - account_email
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: test

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.hibernate.tool.hbm2ddl: WARN


modutime:
  host:
    client: "http://localhost:3000"
    server: "http://localhost:8080"

token:
  secret: secret
  access-token-expiration-time: 900000 # 15 minutes
  refresh-token-expiration-time: 1209600000 # 2 weeks
