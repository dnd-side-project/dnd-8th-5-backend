name: 블루-그린 배포 테스트 (Green EC2 생성 → 헬스체크 → 종료)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '배포할 브랜치를 입력합니다.'
        required: true
        default: 'main'
      info:
        description: '배포내용을 입력합니다.'
        required: true

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-2

jobs:
  test-green-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 배포내용 출력
        run: echo "배포 내용 - ${{ inputs.info }}"

      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ──────────────────────────────────────
      # 빌드 & Docker 이미지 Push
      # ──────────────────────────────────────
      - name: Build with Gradle
        run: ./gradlew clean bootJar --info --build-cache -x test -Pinclude-api-docs

      - name: Docker 이미지 빌드 및 Push
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker build -t ${{ secrets.DOCKER_REPO }}/modutime-web .
          docker push ${{ secrets.DOCKER_REPO }}/modutime-web
          docker build -t ${{ secrets.DOCKER_REPO }}/modutime-nginx ./nginx
          docker push ${{ secrets.DOCKER_REPO }}/modutime-nginx

      # ──────────────────────────────────────
      # Green EC2 생성
      # ──────────────────────────────────────
      - name: Green 인스턴스 생성
        id: green
        run: |
          INSTANCE_ID=$(aws ec2 run-instances \
            --launch-template LaunchTemplateId=${{ secrets.LAUNCH_TEMPLATE_ID }} \
            --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=modutime-green-test},{Key=DeployedBy,Value=github-actions}]' \
            --query 'Instances[0].InstanceId' \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "✅ Green 인스턴스 생성: $INSTANCE_ID"

      - name: Green 인스턴스 실행 대기
        run: |
          aws ec2 wait instance-running \
            --instance-ids ${{ steps.green.outputs.instance_id }}
          echo "✅ Green 인스턴스 running"

      - name: Green 인스턴스 IP 확인
        id: green_ip
        run: |
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids ${{ steps.green.outputs.instance_id }} \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "public_ip=$PUBLIC_IP" >> "$GITHUB_OUTPUT"
          echo "✅ Green IP: $PUBLIC_IP"

      # ──────────────────────────────────────
      # SSH 키 설정 & 접속 대기
      # ──────────────────────────────────────
      - name: SSH 키 설정
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Green SSH 접속 대기
        run: |
          echo "SSH 준비 대기 중..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -i ~/.ssh/deploy_key ubuntu@${{ steps.green_ip.outputs.public_ip }} "echo ok" 2>/dev/null; then
              echo "✅ SSH 접속 성공!"
              exit 0
            fi
            echo "대기 중... ($i/30)"
            sleep 10
          done
          echo "❌ SSH 접속 실패"
          exit 1

      # ──────────────────────────────────────
      # Green에 앱 배포
      # ──────────────────────────────────────
      - name: Green 인스턴스에 소스 복사
        uses: burnett01/rsync-deployments@4.1
        with:
          switches: -avzr --delete
          remote_path: /home/ubuntu/srv/ubuntu
          remote_host: ${{ steps.green_ip.outputs.public_ip }}
          remote_user: ubuntu
          remote_key: ${{ secrets.KEY }}

      - name: Green 인스턴스에 앱 배포
        uses: appleboy/ssh-action@master
        with:
          host: ${{ steps.green_ip.outputs.public_ip }}
          username: ubuntu
          key: ${{ secrets.KEY }}
          command_timeout: 10m
          script: |
            cd /home/ubuntu/srv/ubuntu

            cat > .env << EOL
            DB_URL=${{ secrets.PROD_DB_URL }}
            DB_USERNAME=${{ secrets.PROD_DB_USERNAME }}
            DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
            KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EOL

            sudo sh install-docker.sh
            sudo docker pull ${{ secrets.DOCKER_REPO }}/modutime-web
            sudo docker pull ${{ secrets.DOCKER_REPO }}/modutime-nginx
            sudo docker-compose --env-file .env up -d

      # ──────────────────────────────────────
      # 헬스체크
      # ──────────────────────────────────────
      - name: Green 인스턴스 헬스체크
        run: |
          echo "헬스체크 시작 (최대 3분 대기, 경로: /aws)"
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://${{ steps.green_ip.outputs.public_ip }}:80/aws" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ 헬스체크 성공! (status=$STATUS)"
              exit 0
            fi
            echo "대기 중... ($i/18, status=$STATUS)"
            sleep 10
          done
          echo "❌ 헬스체크 실패"
          exit 1

      # ──────────────────────────────────────
      # 테스트 완료 → Green 종료
      # ──────────────────────────────────────
      - name: Green 인스턴스 종료 (테스트 완료)
        if: always()
        run: |
          if [ -n "${{ steps.green.outputs.instance_id }}" ]; then
            echo "Green 인스턴스 종료: ${{ steps.green.outputs.instance_id }}"
            aws ec2 terminate-instances \
              --instance-ids ${{ steps.green.outputs.instance_id }} 2>/dev/null || true
            echo "✅ Green 인스턴스 terminate 요청 완료"
          fi
